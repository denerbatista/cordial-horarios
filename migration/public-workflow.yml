# Workflow do repo PÚBLICO após a migração.
# Substitui o .github/workflows/update-schedules.yml atual.
#
# O que faz: apenas publica no GitHub Pages quando alguém (o bot do repo
# privado) faz push no main. Não builda mais nada — todo o trabalho de
# extração/build/minificação é do repo privado.

name: Publicar GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Pages
        uses: actions/configure-pages@v5
      - name: Upload do site
        uses: actions/upload-pages-artifact@v3
        with:
          # Após a migração, o conteúdo do site está na raiz do repo público.
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
