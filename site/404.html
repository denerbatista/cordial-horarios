<!doctype html>
<html lang="pt-BR" style="color-scheme: light;">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="theme-color" content="#0024F8" />
<title>Página não encontrada · Cordial Horários</title>
<meta name="robots" content="noindex,follow" />
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%230024F8'/><text x='32' y='44' font-family='Arial' font-size='38' font-weight='bold' text-anchor='middle' fill='white'>C</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" />
<style>
  *,*::before,*::after { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 20px;
    font-family: 'Inter', system-ui, sans-serif;
    color: #0B0F2C;
    background:
      radial-gradient(1200px 600px at 20% -10%, rgba(0,36,248,.06), transparent 60%),
      radial-gradient(900px 500px at 100% 100%, rgba(0,36,248,.04), transparent 60%),
      #F7F8FC;
  }
  .card {
    max-width: 480px;
    width: 100%;
    background: #fff;
    border: 1px solid #E4E7F2;
    border-radius: 24px;
    padding: 36px 28px;
    text-align: center;
    box-shadow: 0 16px 40px rgba(11,15,44,.08);
  }
  .badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 999px;
    background: #E5E9FE;
    color: #0024F8;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  h1 {
    font-family: 'Geist', sans-serif;
    font-size: 64px;
    line-height: 1;
    margin: 0 0 8px;
    color: #0024F8;
    letter-spacing: -.04em;
  }
  h2 {
    font-family: 'Geist', sans-serif;
    font-size: 22px;
    margin: 0 0 12px;
    color: #0B0F2C;
    font-weight: 600;
  }
  p {
    margin: 0 0 24px;
    color: #5B6380;
    font-size: 15px;
    line-height: 1.55;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 22px;
    border-radius: 999px;
    background: #0024F8;
    color: #fff;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    box-shadow: 0 8px 20px -6px rgba(0,36,248,.6);
    transition: transform .12s, background .12s, box-shadow .12s;
  }
  .btn:hover { transform: translateY(-1px); background: #001FD6; box-shadow: 0 14px 28px -8px rgba(0,36,248,.65); }
  .btn svg { width: 16px; height: 16px; }
  .muted {
    margin-top: 18px;
    font-size: 12px;
    color: #8890A8;
  }
  .muted a { color: #0024F8; text-decoration: none; }
</style>
</head>
<body>
  <main class="card" role="main">
    <span class="badge">Erro 404</span>
    <h1>Ops!</h1>
    <h2>Página não encontrada</h2>
    <p>A página que você procura não existe ou foi movida. Mas tudo bem — os horários estão a um clique de distância.</p>
    <a href="/cordial-horarios/" class="btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
      Voltar para o início
    </a>
    <div class="muted">Cordial Horários · <a href="/cordial-horarios/">denerbatista.github.io/cordial-horarios</a></div>
  </main>
</body>
</html>
