name: Atualizar horários

# Source code (parser, build, extractor) NÃO vive neste repo público.
# Ele fica em ~/cordial-source/ no PC do dono, junto com o self-hosted runner.
# Este workflow apenas orquestra: runner executa o build localmente e commita
# só o resultado (schedules.json + sitemap.xml) de volta no repo.

on:
  schedule:
    - cron: "0 12 * * *"   # 09:00 BRT - PC provavelmente ligado
  workflow_dispatch: {}
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: "update-schedules"
  cancel-in-progress: true

jobs:
  update:
    name: Build no PC e commitar schedules.json
    if: github.event_name != 'push'
    runs-on: [self-hosted, Linux, X64, cordial]
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    outputs:
      total_trips: ${{ steps.build.outputs.total_trips }}
      exit_code:   ${{ steps.build.outputs.exit_code }}
    steps:
      - name: Checkout (repo público)
        uses: actions/checkout@v4

      - name: Validar source local
        run: |
          if [ -z "${HOME:-}" ] || [ ! -d "$HOME/cordial-source/scripts" ]; then
            echo "::error::Faltando $HOME/cordial-source/scripts no PC. Clone seu source pra lá."
            exit 1
          fi
          # symlink temporário pra build.py poder importar tudo
          ln -sfn "$HOME/cordial-source/scripts" scripts
          ln -sfn "$HOME/cordial-source/fixtures" fixtures
          cp -f "$HOME/cordial-source/requirements.txt" .

      - name: Setup Python venv (persistente em ~/cordial-source/venv)
        run: |
          VENV="$HOME/cordial-source/venv"
          if [ ! -x "$VENV/bin/python3" ]; then
            python3 -m venv "$VENV"
          fi
          "$VENV/bin/pip" install --upgrade pip --quiet
          "$VENV/bin/pip" install -r "$HOME/cordial-source/requirements.txt" --quiet

      - name: Rodar build (com IP residencial)
        id: build
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          PYBIN="$HOME/cordial-source/venv/bin/python3"
          set +e
          "$PYBIN" scripts/build.py --out site/data/schedules.json
          status=$?
          set -e
          trips=0
          if [ -f site/data/schedules.json ]; then
            trips=$("$PYBIN" -c "import json; print(json.load(open('site/data/schedules.json'))['totalTrips'])")
            echo "--- resumo ---"
            "$PYBIN" - <<'PY'
          import json
          d = json.load(open("site/data/schedules.json"))
          print(f"trips: {d['totalTrips']}")
          print(f"places: {len(d['places'])}")
          for s, info in d["sectors"].items():
              print(f"  {s}: {info['trip_count']} viagens")
          PY
          fi
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          echo "total_trips=$trips" >> "$GITHUB_OUTPUT"

      - name: Limpar artefatos do source (não commitar)
        if: always()
        run: |
          rm -f scripts fixtures requirements.txt

      - name: Commit + push (se mudou)
        id: commit
        if: steps.build.outputs.total_trips != '0'
        run: |
          git config user.name  "cordial-horarios-bot"
          git config user.email "actions@users.noreply.github.com"
          git add site/data/schedules.json site/sitemap.xml
          if git diff --staged --quiet; then
            echo "Sem mudanças nos horários."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            ts=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "data: atualizar horários ($ts)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Abrir/atualizar issue em caso de falha
        if: steps.build.outputs.exit_code != '0' || steps.build.outputs.total_trips == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const exitCode = '${{ steps.build.outputs.exit_code }}';
            const totalTrips = '${{ steps.build.outputs.total_trips }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const label = "build-failed";
            try { await github.rest.issues.getLabel({ ...context.repo, name: label }); }
            catch (e) { if (e.status === 404) {
              await github.rest.issues.createLabel({ ...context.repo, name: label, color: "d73a4a" });
            } }
            const open = await github.rest.issues.listForRepo({
              ...context.repo, state: "open", labels: label, per_page: 5,
            });
            if (open.data.length) {
              await github.rest.issues.createComment({ ...context.repo, issue_number: open.data[0].number,
                body: `Falha em ${new Date().toISOString()}.\nrun: ${runUrl}\nexit=${exitCode} trips=${totalTrips}` });
            } else {
              await github.rest.issues.create({ ...context.repo,
                title: "⚠️ Build dos horários falhou",
                body: `exit=${exitCode} trips=${totalTrips}\nrun: ${runUrl}`,
                labels: [label] });
            }
            core.setFailed(`Build falhou (exit=${exitCode}, trips=${totalTrips})`);

      - name: Fechar issue de falha se voltou a funcionar
        if: steps.build.outputs.exit_code == '0' && steps.build.outputs.total_trips != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const label = "build-failed";
            const open = await github.rest.issues.listForRepo({
              ...context.repo, state: "open", labels: label, per_page: 10,
            });
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            for (const it of open.data) {
              await github.rest.issues.createComment({ ...context.repo, issue_number: it.number,
                body: `✅ Build voltou a ter sucesso em ${new Date().toISOString()}.\nrun: ${runUrl}` });
              await github.rest.issues.update({ ...context.repo, issue_number: it.number, state: "closed" });
            }

  deploy:
    name: Publicar GitHub Pages
    runs-on: ubuntu-latest
    needs: update
    if: |
      always() && (
        github.event_name == 'push' ||
        needs.update.result == 'success'
      )
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
