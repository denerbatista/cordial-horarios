name: Atualizar horários

on:
  schedule:
    - cron: "0 6 * * *"   # diariamente às 06:00 UTC (~03:00 BRT)
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "site/**"
      - "scripts/**"
      - ".github/workflows/update-schedules.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "update-schedules"
  cancel-in-progress: false

jobs:
  update:
    name: Baixar PDFs e gerar schedules.json
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar build
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python scripts/build.py --out site/data/schedules.json
          echo "--- resumo ---"
          python - <<'PY'
          import json
          d = json.load(open("site/data/schedules.json"))
          print(f"trips: {d['totalTrips']}")
          print(f"places: {len(d['places'])}")
          for s, info in d["sectors"].items():
              print(f"  {s}: {info['trip_count']} viagens (url={info['source_url']})")
          PY

      - name: Commit (se houver mudança)
        id: commit
        run: |
          git config user.name  "cordial-horarios-bot"
          git config user.email "actions@users.noreply.github.com"
          git add site/data/schedules.json site/sitemap.xml
          if git diff --staged --quiet; then
            echo "Sem mudanças nos horários."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            ts=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "data: atualizar horários ($ts)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Publicar GitHub Pages
    runs-on: ubuntu-latest
    needs: update
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (após commit)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Upload do site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
