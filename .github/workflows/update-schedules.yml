name: Atualizar horários

on:
  schedule:
    - cron: "0 6 * * *"   # diariamente às 06:00 UTC (~03:00 BRT)
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "site/**"
      - "scripts/**"
      - ".github/workflows/update-schedules.yml"

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: "update-schedules"
  cancel-in-progress: false

jobs:
  update:
    name: Baixar PDFs e gerar schedules.json
    # Self-hosted: roda no PC do dono do repo (que não está bloqueado pela Cordial).
    # Pra registrar um runner, ver Settings -> Actions -> Runners -> New self-hosted runner.
    # O runner precisa estar etiquetado com "cordial".
    runs-on: [self-hosted, cordial]
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    if: github.event_name != 'push'
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar build
        id: build
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set +e
          python scripts/build.py --out site/data/schedules.json
          status=$?
          set -e
          if [ -f site/data/schedules.json ]; then
            trips=$(python -c "import json; print(json.load(open('site/data/schedules.json'))['totalTrips'])")
            echo "--- resumo ---"
            python - <<'PY'
          import json
          d = json.load(open("site/data/schedules.json"))
          print(f"trips: {d['totalTrips']}")
          print(f"places: {len(d['places'])}")
          for s, info in d["sectors"].items():
              print(f"  {s}: {info['trip_count']} viagens (url={info['source_url']})")
          PY
          else
            trips=0
          fi
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          echo "total_trips=$trips" >> "$GITHUB_OUTPUT"

      - name: Commit (se houver mudança)
        id: commit
        if: steps.build.outputs.total_trips != '0'
        run: |
          git config user.name  "cordial-horarios-bot"
          git config user.email "actions@users.noreply.github.com"
          git add site/data/schedules.json site/sitemap.xml
          if git diff --staged --quiet; then
            echo "Sem mudanças nos horários."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            ts=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "data: atualizar horários ($ts)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Abrir/atualizar issue em caso de falha
        if: steps.build.outputs.exit_code != '0' || steps.build.outputs.total_trips == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const exitCode = '${{ steps.build.outputs.exit_code }}';
            const totalTrips = '${{ steps.build.outputs.total_trips }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = "⚠️ Build dos horários falhou (Cordial PDFs)";
            const label = "build-failed";

            // Garante que a label existe
            try { await github.rest.issues.getLabel({ ...context.repo, name: label }); }
            catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({ ...context.repo, name: label, color: "d73a4a",
                  description: "build do schedules.json falhou (provavelmente extração da Cordial)" });
              }
            }

            const body = [
              `O workflow "Atualizar horários" não conseguiu gerar um \`schedules.json\` válido.`,
              ``,
              `- exit_code do build.py: \`${exitCode}\``,
              `- total_trips extraído: \`${totalTrips}\``,
              `- run: ${runUrl}`,
              ``,
              `**Causa mais provável:** servidor da Cordial Turismo passou a bloquear o IP do runner do GitHub Actions (\`x-deny-reason: host_not_allowed\`). O cron diário continuará tentando até o problema ser resolvido.`,
              ``,
              `**Próximos passos sugeridos:**`,
              `1. Conferir os logs da step "Rodar build" no run acima.`,
              `2. Se for 403 da Cordial, considerar self-hosted runner ou proxy de IP brasileiro.`,
              `3. Quando o build voltar a ter sucesso, esta issue é fechada automaticamente.`,
            ].join("\n");

            // Procura issue aberta existente com a label
            const open = await github.rest.issues.listForRepo({
              ...context.repo, state: "open", labels: label, per_page: 5,
            });
            if (open.data.length) {
              const num = open.data[0].number;
              await github.rest.issues.createComment({ ...context.repo, issue_number: num,
                body: `Falha novamente em ${new Date().toISOString()}.\nrun: ${runUrl}\nexit_code=\`${exitCode}\` total_trips=\`${totalTrips}\`` });
              core.notice(`Comentário adicionado na issue #${num}.`);
            } else {
              const created = await github.rest.issues.create({ ...context.repo, title, body, labels: [label] });
              core.notice(`Issue criada: #${created.data.number}.`);
            }
            core.setFailed(`Build falhou (exit=${exitCode}, trips=${totalTrips})`);

      - name: Fechar issue de falha se voltou a funcionar
        if: steps.build.outputs.exit_code == '0' && steps.build.outputs.total_trips != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const label = "build-failed";
            const open = await github.rest.issues.listForRepo({
              ...context.repo, state: "open", labels: label, per_page: 10,
            });
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            for (const it of open.data) {
              await github.rest.issues.createComment({ ...context.repo, issue_number: it.number,
                body: `✅ Build voltou a ter sucesso em ${new Date().toISOString()}.\nrun: ${runUrl}` });
              await github.rest.issues.update({ ...context.repo, issue_number: it.number, state: "closed" });
              core.notice(`Issue #${it.number} fechada.`);
            }

  deploy:
    name: Publicar GitHub Pages
    # Roda em hosted runner (Pages só precisa publicar; não toca em Cordial).
    runs-on: ubuntu-latest
    needs: update
    # Roda em push (update foi skipped) ou após update com sucesso.
    if: |
      always() && (
        github.event_name == 'push' ||
        needs.update.result == 'success'
      )
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (após commit)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Upload do site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
